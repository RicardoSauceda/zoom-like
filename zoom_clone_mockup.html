<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zoom Workplace Mock</title>
  <style>
    :root {
      --app-bg: #2b2b2b;
      --topbar: #262626;
      --meeting-bg: #07090d;
      --meeting-header: #0f1012;
      --sidebar-bg: #fbfbfc;
      --sidebar-border: #e5e7eb;
      --sidebar-text: #2d3748;
      --sidebar-muted: #7b8794;
      --zoom-blue: #0e71eb;
      --zoom-green: #00c853;
      --zoom-red: #f03d3d;
      --text-light: #f5f7fa;
      --text-dim: #b9c0ca;
      --tile-pill: rgba(0, 0, 0, 0.62);
      --footer-bg: #050505;
      --footer-hover: rgba(255, 255, 255, 0.08);
      --footer-border: rgba(255, 255, 255, 0.06);
      --panel-bg: #ffffff;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      font-family: "Segoe UI", Tahoma, Arial, sans-serif;
      background: var(--app-bg);
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    button, input { font: inherit; }
    svg { display: block; }

    .app {
      width: 100vw;
      height: 100vh;
      display: grid;
      grid-template-rows: 39px 1fr 66px;
      background: var(--app-bg);
    }

    .topbar {
      background: var(--topbar);
      color: var(--text-light);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px;
      font-size: 12px;
      border-bottom: 1px solid rgba(255,255,255,.04);
    }

    .topbar-left,
    .topbar-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand {
      display: flex;
      flex-direction: column;
      line-height: 0.92;
      font-weight: 600;
      letter-spacing: -.15px;
    }

    .brand small {
      font-size: 10px;
      opacity: .95;
      font-weight: 600;
    }

    .brand span {
      font-size: 13px;
      font-weight: 600;
    }

    .status-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #151515;
      border: 1px solid rgba(255,255,255,.07);
      padding: 4px 10px;
      border-radius: 999px;
      color: #f0f3f8;
    }

    .dot-green {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #1fd06b;
      box-shadow: 0 0 0 2px rgba(31,208,107,.16);
    }

    .window-controls {
      display: flex;
      gap: 12px;
      color: #d5d8de;
      font-size: 16px;
    }

    .main {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 334px;
    }

    .meeting {
      min-width: 0;
      min-height: 0;
      background: var(--meeting-bg);
      display: grid;
      grid-template-rows: 58px 1fr;
    }

    .meeting-header {
      background: linear-gradient(180deg, #0d0f12 0%, #0b0d10 100%);
      border-bottom: 1px solid rgba(255,255,255,.04);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      color: var(--text-light);
      font-size: 12px;
    }

    .meeting-header-left,
    .meeting-header-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-pill {
      height: 30px;
      padding: 0 12px;
      border-radius: 8px;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.08);
      color: #eef2f8;
      white-space: nowrap;
    }

    .meeting-body {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 258px;
      gap: 12px;
      padding: 0;
    }

    .stage-wrap {
      min-width: 0;
      min-height: 0;
      padding: 10px 0 0 0;
      display: flex;
      justify-content: center;
      align-items: stretch;
      background: #030405;
    }

    .stage {
      width: 100%;
      height: 100%;
      position: relative;
      overflow: hidden;
      background: #000;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.025);
    }

    .stage img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .stage-name {
      position: absolute;
      left: 8px;
      bottom: 8px;
      height: 24px;
      padding: 0 9px;
      background: rgba(0,0,0,.62);
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #fff;
      z-index: 2;
    }

    .filmstrip {
      background: #0f1012;
      padding: 10px 8px 10px 0;
      overflow: auto;
      display: grid;
      grid-auto-rows: 135px;
      gap: 9px;
    }

    .tile {
      position: relative;
      overflow: hidden;
      border-radius: 8px;
      background: #090909;
      border: 1px solid rgba(255,255,255,.06);
      cursor: pointer;
    }

    .tile.speaking {
      box-shadow: inset 0 0 0 2px var(--zoom-green);
    }

    .tile img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .tile-name {
      position: absolute;
      left: 8px;
      bottom: 8px;
      max-width: calc(100% - 16px);
      background: var(--tile-pill);
      color: white;
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 11px;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .sidebar {
      min-height: 0;
      background: #f4f5f7;
      border-left: 1px solid var(--sidebar-border);
      display: grid;
      grid-template-rows: 316px 1fr;
      gap: 8px;
      padding: 8px;
      overflow: auto;
    }

    .panel {
      background: var(--panel-bg);
      border: 1px solid #dcdfe4;
      border-radius: 14px;
      overflow: hidden;
      display: grid;
      min-height: 0;
    }

    .panel.ai {
      grid-template-rows: 46px 58px 1fr 50px 88px;
    }

    .panel.participants {
      grid-template-rows: 44px 44px 1fr 54px;
      min-height: 0;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px;
      background: #fbfbfc;
      border-bottom: 1px solid var(--sidebar-border);
    }

    .panel-title {
      font-size: 12px;
      font-weight: 700;
      color: #374151;
    }

    .panel-icons {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #707786;
    }

    .side-icon {
      width: 16px;
      height: 16px;
      color: #6f7683;
      cursor: pointer;
    }

    .companion {
      padding: 8px 14px 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      background: #fbfbfc;
      border-bottom: 1px solid var(--sidebar-border);
    }

    .companion-title {
      text-align: center;
      font-size: 12px;
      font-weight: 600;
      color: #4b5563;
    }

    .companion-stop {
      align-self: center;
      border: 1px solid #ff9999;
      color: #ff5a5a;
      background: white;
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 6px;
      cursor: pointer;
    }

    .chat {
      overflow: auto;
      padding: 14px 12px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      background: #fff;
    }

    .msg {
      display: grid;
      grid-template-columns: 28px 1fr;
      gap: 10px;
      align-items: start;
    }

    .msg.self {
      grid-template-columns: 1fr;
      justify-items: end;
    }

    .msg-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      overflow: hidden;
      background: #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #5a6573;
      font-size: 11px;
      font-weight: 700;
    }

    .msg-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .msg-body {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .msg-row {
      display: flex;
      align-items: baseline;
      gap: 6px;
    }

    .msg.self .msg-row {
      justify-content: flex-end;
    }

    .msg-name {
      font-size: 12px;
      font-weight: 600;
      color: #334155;
    }

    .msg-time {
      font-size: 11px;
      color: #98a2b3;
    }

    .msg-text {
      font-size: 13px;
      color: #111827;
      line-height: 1.35;
      word-break: break-word;
    }

    .msg.self .msg-text {
      background: #eef5ff;
      padding: 8px 10px;
      border-radius: 16px;
      max-width: 78%;
    }

    .quick-prompts {
      padding: 0 14px 10px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      background: #fff;
      border-top: 1px solid #f0f1f3;
    }

    .quick-pill {
      border: 1px solid #d7dbe2;
      background: #f8fafc;
      color: #4b5563;
      font-size: 12px;
      padding: 7px 12px;
      border-radius: 12px;
      cursor: pointer;
    }

    .composer {
      border-top: 1px solid var(--sidebar-border);
      background: white;
      display: grid;
      grid-template-rows: auto auto auto;
      gap: 10px;
      padding: 10px 14px 12px;
    }

    .composer-input-wrap {
      position: relative;
    }

    .composer input {
      width: 100%;
      height: 44px;
      border: 1px solid #d7dbe2;
      border-radius: 12px;
      padding: 0 42px 0 36px;
      font-size: 13px;
      color: #1f2937;
      outline: none;
    }

    .composer input:focus {
      border-color: #9ec5ff;
      box-shadow: 0 0 0 2px rgba(14,113,235,.1);
    }

    .composer-left,
    .composer-send {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      color: #9aa3af;
      width: 18px;
      height: 18px;
    }

    .composer-left { left: 12px; }
    .composer-send { right: 12px; }

    .composer-meta {
      display: flex;
      justify-content: center;
      font-size: 12px;
      color: #95a0ae;
    }

    .send-row {
      display: flex;
      justify-content: flex-end;
    }

    .send {
      border: 0;
      background: transparent;
      color: var(--zoom-blue);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }

    .participants-header {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 0 14px;
      border-bottom: 1px solid var(--sidebar-border);
      font-size: 12px;
      font-weight: 700;
      color: #374151;
      background: #fbfbfc;
    }

    .participants-header .right {
      position: absolute;
      right: 14px;
      display: flex;
      gap: 10px;
      color: #7a818e;
    }

    .participants-search {
      padding: 8px 14px;
      border-bottom: 1px solid var(--sidebar-border);
      background: #fff;
    }

    .participants-search input {
      width: 100%;
      height: 32px;
      border: 1px solid #cfd5dd;
      border-radius: 8px;
      padding: 0 10px;
      outline: none;
      font-size: 12px;
    }

    .participants-list {
      overflow: auto;
      background: #fff;
      padding: 8px 0;
    }

    .group-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 14px 6px;
      font-size: 12px;
      font-weight: 700;
      color: #374151;
    }

    .group-label .muted-link {
      color: var(--zoom-blue);
      font-weight: 500;
    }

    .participant-row {
      display: grid;
      grid-template-columns: 32px 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 10px 14px;
    }

    .participant-row:hover {
      background: #f8fafc;
    }

    .participant-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      color: #fff;
      overflow: hidden;
      user-select: none;
    }

    .participant-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .participant-main {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .participant-name {
      font-size: 12px;
      color: #1f2937;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .participant-sub {
      font-size: 11px;
      color: #6b7280;
    }

    .participant-icons {
      display: flex;
      gap: 8px;
      align-items: center;
      color: #6b7280;
    }

    .participant-icons .red {
      color: #ef4444;
    }

    .participant-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 14px;
      border-top: 1px solid var(--sidebar-border);
      background: #fbfbfc;
    }

    .tiny-btn {
      height: 28px;
      padding: 0 12px;
      border-radius: 8px;
      border: 1px solid #d1d5db;
      background: #fff;
      color: #374151;
      font-size: 12px;
      cursor: pointer;
    }

    .tiny-btn.primary {
      background: #e5edff;
      border-color: #c8d7ff;
      color: #1d4ed8;
    }

    .tiny-btn.ghost {
      width: 28px;
      padding: 0;
    }

    .footer {
      background: var(--footer-bg);
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 0 10px;
      border-top: 1px solid var(--footer-border);
    }

    .footer-left,
    .footer-center,
    .footer-right {
      display: flex;
      align-items: center;
      gap: 2px;
      min-width: 0;
    }

    .footer-left { justify-content: flex-start; }
    .footer-center { justify-content: center; }
    .footer-right { justify-content: flex-end; }

    .control {
      min-width: 74px;
      height: 64px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      color: #f6f7fb;
      border-radius: 6px;
      cursor: pointer;
      padding: 0 6px;
    }

    .control:hover {
      background: var(--footer-hover);
    }

    .control-top {
      display: flex;
      align-items: center;
      gap: 4px;
      height: 20px;
    }

    .control-label {
      font-size: 11px;
      line-height: 1;
      white-space: nowrap;
      text-align: center;
    }

    .icon20 {
      width: 20px;
      height: 20px;
      color: currentColor;
    }

    .caret {
      width: 10px;
      height: 10px;
      color: #d5dae3;
    }

    .danger-icon { color: #ff6a6a; }
    .share-icon { color: #18d26e; }

    .meeting-count {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: #f1f4f8;
    }

    .meeting-count .count-badge {
      font-size: 10px;
      min-width: 14px;
      height: 14px;
      padding: 0 4px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #111827;
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 999px;
    }

    .leave {
      background: transparent;
      color: #ff4d4f;
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 8px;
      padding: 9px 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }

    .leave:hover {
      background: rgba(255,255,255,.05);
    }

    .editor {
      position: fixed;
      right: 348px;
      bottom: 82px;
      width: 320px;
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      box-shadow: 0 24px 60px rgba(0,0,0,.28);
      overflow: hidden;
      z-index: 20;
    }

    .editor.hidden { display: none; }

    .editor-header {
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px;
      background: #fbfbfc;
      border-bottom: 1px solid #eceff3;
      color: #1f2937;
      font-size: 13px;
      font-weight: 600;
    }

    .editor-body {
      padding: 14px;
      display: grid;
      gap: 10px;
    }

    .editor-body input {
      height: 38px;
      border: 1px solid #d7dbe2;
      border-radius: 8px;
      padding: 0 12px;
      outline: none;
    }

    .editor-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .btn {
      height: 38px;
      border: 0;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
    }

    .btn.primary { background: var(--zoom-blue); color: white; }
    .btn.secondary { background: #f3f4f6; color: #1f2937; border: 1px solid #dbe0e6; }

    .icon-btn {
      border: 0;
      background: rgba(255,255,255,.05);
      color: #eef2f8;
      width: 30px;
      height: 30px;
      border-radius: 8px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,.08);
    }

    .icon16 {
      width: 16px;
      height: 16px;
      color: currentColor;
    }

    @media (max-width: 1200px) {
      .meeting-body {
        grid-template-columns: 1fr;
      }
      .filmstrip {
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        grid-auto-rows: 120px;
        padding-left: 10px;
      }
    }

    @media (max-width: 980px) {
      .main { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      .editor { right: 20px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="topbar-left">
        <div class="brand"><small>zoom</small><span>Workplace</span></div>
      </div>
      <div class="topbar-right">
        <div class="status-chip"><span class="dot-green"></span><span>View</span></div>
        <div class="window-controls"><span>–</span><span>□</span><span>✕</span></div>
      </div>
    </div>

    <div class="main">
      <section class="meeting">
        <div class="meeting-header">
          <div class="meeting-header-left">
            <button class="icon-btn" id="toggleEditorBtn" title="Editar mock">
              <svg class="icon16" viewBox="0 0 20 20"><path fill="currentColor" d="M14.7 2.3a1 1 0 0 1 1.4 0l1.6 1.6a1 1 0 0 1 0 1.4l-9.6 9.6-3.5.7.7-3.5 9.4-9.8Z"/></svg>
            </button>
            <div class="header-pill">
              <svg class="icon16" viewBox="0 0 20 20"><path fill="currentColor" d="M10 1.5 4 3.8v5.1c0 4.2 2.7 7.9 6 9.6 3.3-1.7 6-5.4 6-9.6V3.8L10 1.5Z"/></svg>
              <span>Vista del ponente</span>
            </div>
          </div>
          <div class="meeting-header-right">
            <div class="header-pill" id="meetingTitle">Sesión Estratégica</div>
          </div>
        </div>

        <div class="meeting-body">
          <div class="stage-wrap">
            <div class="stage">
              <img id="speakerImg" src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?auto=format&fit=crop&w=1500&q=80" alt="Ponente" />
              <div class="stage-name">
                <svg class="icon16" viewBox="0 0 20 20"><path fill="currentColor" d="M10 13.5A3.5 3.5 0 0 0 13.5 10V6.5a3.5 3.5 0 1 0-7 0V10A3.5 3.5 0 0 0 10 13.5Zm5-3a.5.5 0 0 1 1 0A6 6 0 0 1 10.5 16v1.5h2a.5.5 0 0 1 0 1h-5a.5.5 0 0 1 0-1h2V16A6 6 0 0 1 4 10.5a.5.5 0 0 1 1 0 5 5 0 0 0 10 0Z"/></svg>
                <span id="speakerName">Alejandro Brindis</span>
              </div>
            </div>
          </div>

          <div class="filmstrip" id="filmstrip"></div>
        </div>
      </section>

      <aside class="sidebar">
        <section class="panel ai">
          <div class="panel-header">
            <div class="panel-icons">
              <svg class="side-icon" viewBox="0 0 20 20"><path fill="currentColor" d="M3 10a7 7 0 1 1 2.1 5L2 18l.9-3.1A7 7 0 0 1 3 10Z"/></svg>
              <svg class="side-icon" viewBox="0 0 20 20"><path fill="currentColor" d="M4 4h12v12H4z"/></svg>
            </div>
            <div class="panel-title">AI Companion</div>
            <div class="panel-icons">
              <svg class="side-icon" viewBox="0 0 20 20"><path fill="currentColor" d="M10 1.5 4 3.8v5.1c0 4.2 2.7 7.9 6 9.6 3.3-1.7 6-5.4 6-9.6V3.8L10 1.5Z"/></svg>
              <svg class="side-icon" viewBox="0 0 20 20"><path fill="currentColor" d="m4.7 4 5.3 5.3L15.3 4 16 4.7 10.7 10 16 15.3l-.7.7-5.3-5.3L4.7 16l-.7-.7L9.3 10 4 4.7 4.7 4Z"/></svg>
            </div>
          </div>

          <div class="companion">
            <div class="companion-title">AI Companion</div>
            <button class="companion-stop">Stop AI Companion</button>
          </div>

          <div class="chat" id="chat"></div>

          <div class="quick-prompts">
            <button class="quick-pill" id="promptCatch">Catch me up</button>
            <button class="quick-pill" id="promptMention">Was my name mentioned</button>
          </div>

          <div class="composer">
            <div class="composer-input-wrap">
              <svg class="composer-left" viewBox="0 0 20 20"><path fill="currentColor" d="M4 3.5h12A1.5 1.5 0 0 1 17.5 5v7A1.5 1.5 0 0 1 16 13.5H9l-3.8 3.2a.5.5 0 0 1-.8-.4v-2.8H4A1.5 1.5 0 0 1 2.5 12V5A1.5 1.5 0 0 1 4 3.5Z"/></svg>
              <input id="chatInput" placeholder="Write a message or type / for more" />
              <svg class="composer-send" viewBox="0 0 20 20"><path fill="currentColor" d="M10 2.5a7.5 7.5 0 1 0 7.5 7.5A7.5 7.5 0 0 0 10 2.5Zm3.4 7.9-4 2.8a.7.7 0 0 1-1.1-.6V7a.7.7 0 0 1 1.1-.6l4 2.8a.7.7 0 0 1 0 1.2Z"/></svg>
            </div>
            <div class="send-row"><button class="send" id="sendBtn">Enviar</button></div>
            <div class="composer-meta">AI can make mistakes. Review for accuracy.</div>
          </div>
        </section>

        <section class="panel participants">
          <div class="participants-header">
            <span id="participantsTitle">Participants (6)</span>
            <div class="right">
              <svg class="side-icon" viewBox="0 0 20 20"><path fill="currentColor" d="M4 4h12v12H4z"/></svg>
              <svg class="side-icon" viewBox="0 0 20 20"><path fill="currentColor" d="m4.7 4 5.3 5.3L15.3 4 16 4.7 10.7 10 16 15.3l-.7.7-5.3-5.3L4.7 16l-.7-.7L9.3 10 4 4.7 4.7 4Z"/></svg>
            </div>
          </div>

          <div class="participants-search">
            <input id="participantSearch" placeholder="Find a participant" />
          </div>

          <div class="participants-list" id="participantsList"></div>

          <div class="participant-actions">
            <button class="tiny-btn">Invite</button>
            <button class="tiny-btn">Mute all</button>
            <button class="tiny-btn ghost">⋯</button>
          </div>
        </section>
      </aside>
    </div>

    <div class="footer">
      <div class="footer-left">
        <div class="control">
          <div class="control-top">
            <svg class="icon20 danger-icon" viewBox="0 0 20 20"><path fill="currentColor" d="M10 13.5A3.5 3.5 0 0 0 13.5 10V6.5a3.5 3.5 0 1 0-7 0V10A3.5 3.5 0 0 0 10 13.5Zm5-3a.5.5 0 0 1 1 0A6 6 0 0 1 10.5 16v1.5h2a.5.5 0 0 1 0 1h-5a.5.5 0 0 1 0-1h2V16A6 6 0 0 1 4 10.5a.5.5 0 0 1 1 0 5 5 0 0 0 10 0Z"/></svg>
            <svg class="caret" viewBox="0 0 20 20"><path fill="currentColor" d="m5.5 7 4.5 5 4.5-5z"/></svg>
          </div>
          <div class="control-label">Audio</div>
        </div>

        <div class="control">
          <div class="control-top">
            <svg class="icon20" viewBox="0 0 20 20"><path fill="currentColor" d="M3.5 6A1.5 1.5 0 0 1 5 4.5h6A1.5 1.5 0 0 1 12.5 6v2l2.8-2a1 1 0 0 1 1.7.8v7a1 1 0 0 1-1.7.8l-2.8-2v1.9A1.5 1.5 0 0 1 11 16H5a1.5 1.5 0 0 1-1.5-1.5V6Z"/></svg>
            <svg class="caret" viewBox="0 0 20 20"><path fill="currentColor" d="m5.5 7 4.5 5 4.5-5z"/></svg>
          </div>
          <div class="control-label">Video</div>
        </div>
      </div>

      <div class="footer-center">
        <div class="control">
          <div class="control-top">
            <svg class="icon20" viewBox="0 0 20 20"><path fill="currentColor" d="M10 1.5 4 3.8v5.1c0 4.2 2.7 7.9 6 9.6 3.3-1.7 6-5.4 6-9.6V3.8L10 1.5Z"/></svg>
          </div>
          <div class="control-label">Security</div>
        </div>

        <div class="control">
          <div class="control-top">
            <svg class="icon20" viewBox="0 0 20 20"><path fill="currentColor" d="M10 3a3.3 3.3 0 1 1-3.3 3.3A3.3 3.3 0 0 1 10 3Zm-5 10.2A4.8 4.8 0 0 1 9.8 8.4h.4a4.8 4.8 0 0 1 4.8 4.8V14H5v-.8ZM16 9.8a3 3 0 0 1 0 6v-1a2 2 0 0 0 0-4v-1Z"/></svg>
            <span class="meeting-count"><span>Participants</span><span class="count-badge" id="participantBadge">6</span></span>
          </div>
        </div>

        <div class="control">
          <div class="control-top">
            <svg class="icon20" viewBox="0 0 20 20"><path fill="currentColor" d="M4 3.5h12A1.5 1.5 0 0 1 17.5 5v7A1.5 1.5 0 0 1 16 13.5H9l-3.8 3.2a.5.5 0 0 1-.8-.4v-2.8H4A1.5 1.5 0 0 1 2.5 12V5A1.5 1.5 0 0 1 4 3.5Z"/></svg>
          </div>
          <div class="control-label">Chat</div>
        </div>

        <div class="control">
          <div class="control-top">
            <svg class="icon20" viewBox="0 0 20 20"><path fill="currentColor" d="M10 2.5a7.5 7.5 0 1 0 0 15 7.5 7.5 0 0 0 0-15Zm-2.7 5a1 1 0 1 1 0 2 1 1 0 0 1 0-2Zm5.4 0a1 1 0 1 1 0 2 1 1 0 0 1 0-2ZM6.5 11c.7 1.2 2 2 3.5 2s2.8-.8 3.5-2a.5.5 0 1 1 .9.4A4.9 4.9 0 0 1 10 14a4.9 4.9 0 0 1-4.4-2.6.5.5 0 0 1 .9-.4Z"/></svg>
          </div>
          <div class="control-label">React</div>
        </div>

        <div class="control">
          <div class="control-top">
            <svg class="icon20 share-icon" viewBox="0 0 20 20"><path fill="currentColor" d="M10 2.5 5.5 7h2.8v4.2h3.4V7H14.5L10 2.5ZM3.5 12h13v4h-13v-4Z"/></svg>
            <svg class="caret" viewBox="0 0 20 20"><path fill="currentColor" d="m5.5 7 4.5 5 4.5-5z"/></svg>
          </div>
          <div class="control-label">Share</div>
        </div>

        <div class="control">
          <div class="control-top">
            <svg class="icon20" viewBox="0 0 20 20"><path fill="currentColor" d="M4 4h12v12H4zM6 6v8h8V6H6Z"/></svg>
          </div>
          <div class="control-label">Host tools</div>
        </div>

        <div class="control">
          <div class="control-top">
            <svg class="icon20" viewBox="0 0 20 20"><path fill="currentColor" d="m10 2.3 1.7 4.5 4.6 1.8-4.6 1.8-1.7 4.5-1.7-4.5L3.7 8.6l4.6-1.8L10 2.3Zm5.6 10.7.7 1.9 1.9.7-1.9.7-.7 1.9-.7-1.9-1.9-.7 1.9-.7.7-1.9Z"/></svg>
          </div>
          <div class="control-label">AI Companion</div>
        </div>

        <div class="control">
          <div class="control-top">
            <svg class="icon20" viewBox="0 0 20 20"><path fill="currentColor" d="M10 4a6 6 0 1 0 6 6 6 6 0 0 0-6-6Zm-.5 3h1v3.1l2.4 1.4-.5.9-2.9-1.7V7Z"/></svg>
          </div>
          <div class="control-label">Apps</div>
        </div>

        <div class="control">
          <div class="control-top">
            <svg class="icon20" viewBox="0 0 20 20"><path fill="currentColor" d="M10 4a6 6 0 1 0 6 6 6 6 0 0 0-6-6Zm-.5 3h1v3.1l2.4 1.4-.5.9-2.9-1.7V7Z"/></svg>
          </div>
          <div class="control-label">Record</div>
        </div>

        <div class="control">
          <div class="control-top">
            <svg class="icon20" viewBox="0 0 20 20"><path fill="currentColor" d="M10 1.5a8.5 8.5 0 1 0 8.5 8.5A8.5 8.5 0 0 0 10 1.5Zm0 4a1 1 0 1 1-1 1 1 1 0 0 1 1-1Zm1.2 8H8.8v-1h.7V9.1h-.7v-1h1.4a.7.7 0 0 1 .7.7v3.7h.7v1Z"/></svg>
          </div>
          <div class="control-label">Meeting info</div>
        </div>

        <div class="control">
          <div class="control-top">
            <svg class="icon20" viewBox="0 0 20 20"><path fill="currentColor" d="M4.5 9a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3Zm5.5 0a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3Zm5.5 0a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3Z"/></svg>
          </div>
          <div class="control-label">More</div>
        </div>
      </div>

      <div class="footer-right">
        <button class="leave">End</button>
      </div>
    </div>
  </div>

  <section class="editor hidden" id="editor">
    <div class="editor-header">
      <span>Editar mock</span>
      <button class="btn secondary" id="closeEditorBtn">Cerrar</button>
    </div>
    <div class="editor-body">
      <input id="titleInput" placeholder="Título de la reunión" />
      <input id="speakerNameInput" placeholder="Nombre del ponente" />
      <input id="speakerImageInput" placeholder="URL de imagen del ponente" />
      <div class="editor-actions">
        <button class="btn primary" id="applyBtn">Aplicar</button>
        <button class="btn secondary" id="addParticipantBtn">Añadir</button>
      </div>
    </div>
  </section>

  <script>
    const palette = ['#f59e0b','#14b8a6','#8b5cf6','#ef4444','#3b82f6','#10b981','#ec4899','#6366f1'];

    const state = {
      title: 'Sesión Estratégica',
      speaker: {
        name: 'Alejandro Brindis',
        img: 'https://images.unsplash.com/photo-1500648767791-00dcc994a43e?auto=format&fit=crop&w=1500&q=80'
      },
      participants: [
        { name: 'ICATECH', role: '(Host, me)', img: '', muted: false, video: false, speaking: false, raise:false, color: '#111827' },
        { name: 'Victoria Reyes', role: '(Host)', img: '', muted: false, video: true, speaking: false, raise:true, color: '#f59e0b' },
        { name: 'Henry Park', role: '', img: '', muted: false, video: true, speaking: true, raise:false, color: '#14b8a6' },
        { name: 'Marketing Huddle', role: '', img: '', muted: true, video: true, speaking: false, raise:true, color: '#8b5cf6' },
        { name: 'Casey Cast', role: '', img: '', muted: true, video: false, speaking: false, raise:false, color: '#ef4444' },
        { name: 'Mike Nolan', role: '', img: '', muted: false, video: true, speaking: false, raise:false, color: '#3b82f6' }
      ],
      chat: [
        { name: 'Tú', text: 'Hola', self: true, time: '11:09 AM' },
        { name: 'AI Companion', text: 'Hello! How can I help you today?', time: '', ai: true },
        { name: 'Victoria Reyes', text: 'Ya revisé la vista principal y el panel lateral.', time: '11:10 AM' },
        { name: 'Henry Park', text: 'La sesión se ve bastante cercana al flujo real.', time: '11:11 AM' },
        { name: 'Mike Nolan', text: 'Podemos validar la experiencia con participants panel.', time: '11:12 AM' }
      ]
    };

    const $ = (id) => document.getElementById(id);

    function initials(name) {
      return name.split(/\s+/).map(p => p[0] || '').join('').slice(0, 2).toUpperCase();
    }

    function timeNow() {
      return new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
    }

    function participantCount() {
      return state.participants.length;
    }

    function renderHeader() {
      $('meetingTitle').textContent = state.title;
      $('speakerName').textContent = state.speaker.name;
      $('speakerImg').src = state.speaker.img;
      $('participantBadge').textContent = String(participantCount());
      $('participantsTitle').textContent = `Participants (${participantCount()})`;
    }

    function micGlyph(muted) {
      return muted ? '🔇' : '🎤';
    }

    function renderAvatar(participant) {
      if (participant.img) {
        return `<div class="participant-avatar"><img src="${participant.img}" alt="${participant.name}" /></div>`;
      }
      return `<div class="participant-avatar" style="background:${participant.color || palette[0]}">${initials(participant.name)}</div>`;
    }

    function chatAvatar(name) {
      const participant = state.participants.find(p => p.name === name);
      if (!participant) return `<div class="msg-avatar">${initials(name)}</div>`;
      if (participant.img) return `<div class="msg-avatar"><img src="${participant.img}" alt="${name}" /></div>`;
      return `<div class="msg-avatar" style="background:${participant.color}; color:#fff;">${initials(name)}</div>`;
    }

    function renderFilmstrip() {
      const strip = $('filmstrip');
      strip.innerHTML = '';
      state.participants.filter(p => p.name !== 'ICATECH').forEach((p, i) => {
        const tile = document.createElement('div');
        tile.className = `tile ${p.speaking ? 'speaking' : ''}`;
        tile.innerHTML = `
          <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:${p.img ? 'transparent' : p.color};color:#fff;font-size:36px;font-weight:700;">${p.img ? '' : initials(p.name)}</div>
          ${p.img ? `<img src="${p.img}" alt="${p.name}" />` : ''}
          <div class="tile-name"><span>${micGlyph(p.muted)}</span><span>${p.name}</span></div>
        `;
        tile.onclick = () => editParticipant(i + 1);
        strip.appendChild(tile);
      });
    }

    function renderChat() {
      const box = $('chat');
      box.innerHTML = '';
      state.chat.forEach(msg => {
        const row = document.createElement('div');
        row.className = `msg ${msg.self ? 'self' : ''}`;

        if (msg.self) {
          row.innerHTML = `
            <div class="msg-body">
              <div class="msg-row"><span class="msg-time">${msg.time || ''}</span></div>
              <div class="msg-text">${msg.text}</div>
            </div>
          `;
        } else if (msg.ai) {
          row.innerHTML = `
            <div class="msg-avatar" style="background:#eef2ff;color:#4f46e5;">✦</div>
            <div class="msg-body">
              <div class="msg-row"><span class="msg-name">${msg.name}</span></div>
              <div class="msg-text">${msg.text}</div>
            </div>
          `;
        } else {
          row.innerHTML = `
            ${chatAvatar(msg.name)}
            <div class="msg-body">
              <div class="msg-row"><span class="msg-name">${msg.name}</span><span class="msg-time">${msg.time || ''}</span></div>
              <div class="msg-text">${msg.text}</div>
            </div>
          `;
        }
        box.appendChild(row);
      });
      box.scrollTop = box.scrollHeight;
    }

    function renderParticipantsList() {
      const box = $('participantsList');
      const q = ($('participantSearch').value || '').trim().toLowerCase();
      const items = state.participants.filter(p => p.name.toLowerCase().includes(q));
      box.innerHTML = '';

      const joinedLabel = document.createElement('div');
      joinedLabel.className = 'group-label';
      joinedLabel.innerHTML = `<span>Joined (${items.length})</span>`;
      box.appendChild(joinedLabel);

      items.forEach((p, index) => {
        const row = document.createElement('div');
        row.className = 'participant-row';
        row.innerHTML = `
          ${renderAvatar(p)}
          <div class="participant-main">
            <div class="participant-name">${p.name}${p.role ? ' ' + p.role : ''}</div>
            <div class="participant-sub">${p.speaking ? 'Speaking' : p.muted ? 'Muted' : 'Available'}</div>
          </div>
          <div class="participant-icons">
            ${p.raise ? `<svg class="side-icon" viewBox="0 0 20 20" title="Raise hand"><path fill="currentColor" d="M9 2a1 1 0 0 1 1 1v7h1V4a1 1 0 1 1 2 0v6h1V5a1 1 0 1 1 2 0v7.5a3.5 3.5 0 0 1-3.5 3.5H9.8A4.8 4.8 0 0 1 5 11.2V8a1 1 0 1 1 2 0v3.2A2.8 2.8 0 0 0 9.8 14H12.5A1.5 1.5 0 0 0 14 12.5V10h-4V3a1 1 0 0 1 1-1Z"/></svg>` : ``}
            <svg class="side-icon ${p.muted ? 'red' : ''}" viewBox="0 0 20 20"><path fill="currentColor" d="M10 13.5A3.5 3.5 0 0 0 13.5 10V6.5a3.5 3.5 0 1 0-7 0V10A3.5 3.5 0 0 0 10 13.5Zm5-3a.5.5 0 0 1 1 0A6 6 0 0 1 10.5 16v1.5h2a.5.5 0 0 1 0 1h-5a.5.5 0 0 1 0-1h2V16A6 6 0 0 1 4 10.5a.5.5 0 0 1 1 0 5 5 0 0 0 10 0Z"/></svg>
            <svg class="side-icon ${!p.video ? 'red' : ''}" viewBox="0 0 20 20"><path fill="currentColor" d="M3.5 6A1.5 1.5 0 0 1 5 4.5h6A1.5 1.5 0 0 1 12.5 6v2l2.8-2a1 1 0 0 1 1.7.8v7a1 1 0 0 1-1.7.8l-2.8-2v1.9A1.5 1.5 0 0 1 11 16H5a1.5 1.5 0 0 1-1.5-1.5V6Z"/></svg>
          </div>
        `;
        row.onclick = () => editParticipant(index);
        box.appendChild(row);
      });
    }

    function sendMessage() {
      const input = $('chatInput');
      const text = input.value.trim();
      if (!text) return;
      state.chat.push({ name: 'Tú', text, self: true, time: timeNow() });
      input.value = '';
      renderChat();
    }

    function seedCatchUp() {
      state.chat.push({ name: 'AI Companion', ai: true, text: 'Here is a quick summary of the recent conversation and shared context.', time: '' });
      renderChat();
    }

    function seedMention() {
      state.chat.push({ name: 'AI Companion', ai: true, text: 'Your name was mentioned in the participants panel and recent messages.', time: '' });
      renderChat();
    }

    function toggleEditor(show) {
      $('editor').classList.toggle('hidden', !show);
      if (show) {
        $('titleInput').value = state.title;
        $('speakerNameInput').value = state.speaker.name;
        $('speakerImageInput').value = state.speaker.img;
      }
    }

    function applyChanges() {
      state.title = $('titleInput').value.trim() || state.title;
      state.speaker.name = $('speakerNameInput').value.trim() || state.speaker.name;
      state.speaker.img = $('speakerImageInput').value.trim() || state.speaker.img;
      renderHeader();
      toggleEditor(false);
    }

    function addParticipant() {
      const idx = state.participants.length;
      state.participants.push({
        name: `Invitado ${idx}`,
        role: '',
        img: '',
        muted: true,
        video: false,
        speaking: false,
        color: palette[idx % palette.length]
      });
      renderAll();
    }

    function editParticipant(index) {
      const p = state.participants[index];
      const name = prompt('Nombre del participante:', p.name);
      if (name === null) return;
      const img = prompt('URL de imagen (vacío para avatar con letras):', p.img || '');
      if (img === null) return;
      const muted = confirm('¿Micrófono apagado?');
      const video = confirm('¿Video encendido?');
      const speaking = confirm('¿Está hablando?');
      const makeSpeaker = confirm('¿Convertir en ponente principal?');

      state.participants[index] = { ...p, name: name || p.name, img: img || '', muted, video, speaking };
      if (makeSpeaker) {
        state.speaker = { name: state.participants[index].name, img: state.participants[index].img || state.speaker.img };
      }
      renderAll();
    }

    function renderAll() {
      renderHeader();
      renderFilmstrip();
      renderChat();
      renderParticipantsList();
    }

    $('sendBtn').onclick = sendMessage;
    $('chatInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') sendMessage(); });
    $('toggleEditorBtn').onclick = () => toggleEditor(true);
    $('closeEditorBtn').onclick = () => toggleEditor(false);
    $('applyBtn').onclick = applyChanges;
    $('addParticipantBtn').onclick = addParticipant;
    $('promptCatch').onclick = seedCatchUp;
    $('promptMention').onclick = seedMention;
    $('participantSearch').addEventListener('input', renderParticipantsList);

    renderAll();
  </script>
</body>
</html>
